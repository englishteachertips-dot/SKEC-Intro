<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SKEC - English Subject Knowledge Enhancement</title>
<style>
* {
margin: 0;
padding: 0;
box-sizing: border-box;
}

body {
font-family: Impact, sans-serif;
background: linear-gradient(135deg, #0A1F16 0%, #0BB5B5 100%);
min-height: 100vh;
display: flex;
justify-content: center;
align-items: center;
padding: 20px;
}

.container {
text-align: center;
max-width: 600px;
width: 100%;
}

h1 {
color: #0BB5B5;
font-size: 48px;
margin-bottom: 60px;
letter-spacing: 4px;
}

.options {
display: flex;
flex-direction: column;
gap: 30px;
}

.box {
background: rgba(11, 181, 181, 0.1);
border: 2px solid #0BB5B5;
padding: 40px;
border-radius: 8px;
cursor: pointer;
transition: all 0.3s ease;
letter-spacing: 2px;
}

.box:hover {
background: rgba(11, 181, 181, 0.2);
transform: scale(1.05);
}

.box h2 {
color: #0BB5B5;
font-size: 28px;
margin-bottom: 15px;
letter-spacing: 3px;
}

.box p {
color: #ffffff;
font-size: 16px;
line-height: 1.6;
letter-spacing: 1px;
}
</style>
</head>
<body>
<div class="container">
<h1>SKEC</h1>
<div class="options">
<div class="box">
<h2>Course Overview</h2>
<p>Start with a guided introduction to all ten modules and see what you'll cover</p>
</div>
<div class="box">
<h2>Resources & Downloads</h2>
<p>Jump straight to free templates, guides, and teaching materials</p>
</div>
<div class="box">
<h2>Coaching Video</h2>
<p>Watch a quick video tour of everything else on offer</p>
</div>
</div>
</div>
</body>
</html>
