<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SKEC - English Subject Knowledge Enhancement</title>
<style>
* {
margin: 0;
padding: 0;
box-sizing: border-box;
}

body {
font-family: Impact, Remo, sans-serif;
background: linear-gradient(135deg, #0A1F16 0%, #0BB5B5 100%);
min-height: 100vh;
display: flex;
justify-content: center;
align-items: center;
padding: 20px;
}

.container {
text-align: center;
max-width: 1000px;
}

h1 {
color: #00ffff;
font-size: 48px;
margin-bottom: 50px;
text-shadow: 0 0 20px rgba(11, 181, 181, 0.5);
}

.options {
display: grid;
grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
gap: 30px;
margin-top: 40px;
}

.option-box {
background: rgba(10, 31, 22, 0.8);
border: 2px solid #0BB5B5;
padding: 40px;
border-radius: 10px;
cursor: pointer;
transition: all 0.3s ease;
box-shadow: 0 8px 16px rgba(0, 0, 0, 0.3);
}

.option-box:hover {
background: rgba(11, 181, 181, 0.2);
transform: translateY(-5px);
box-shadow: 0 12px 24px rgba(11, 181, 181, 0.4);
}

.option-box h2 {
color: #00ffff;
font-size: 28px;
margin-bottom: 15px;
}

.option-box p {
color: #ffffff;
font-size: 16px;
line-height: 1.6;
}
</style>
</head>
<body>
<div class="container">
<h1>SKEC</h1>
<div class="options">
<div class="option-box" onclick="selectOption('overview')">
<h2>Course Overview</h2>
<p>Understand the full structure and what you'll learn in each module</p>
</div>
<div class="option-box" onclick="selectOption('resources')">
<h2>Resources & Downloads</h2>
<p>Access all the teaching materials, templates, and practical resources</p>
</div>
<div class="option-box" onclick="selectOption('coaching')">
<h2>Coaching Video</h2>
<p>Watch tutorials and see what else is available on ETCPD</p>
</div>
</div>
</div>

<script>
function selectOption(option) {
alert('You selected: ' + option);
// Later we can link to actual pages here
}
</script>
</body>
</html>
